<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RIT Dining Dollar Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    select option { background: #1a1a1a; color: white; }
    @media (max-width: 500px) {
      .grid-2 { grid-template-columns: 1fr !important; }
      .plan-btn { font-size: 11px !important; padding: 6px 10px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const PLANS = {
      STRIPES:   { label: "Stripes",   total: 1000,  weekly: 62.50,   hasGracie: false },
      CLAWS:     { label: "Claws",     total: 1500,  weekly: 93.75,   hasGracie: false },
      SPIRIT:    { label: "Spirit",    total: 2000,  weekly: 125.00,  hasGracie: false },
      BRICKS:    { label: "Bricks",    total: 2800,  weekly: 175.00,  hasGracie: false },
      TIGER:     { label: "Tiger",     total: 3640,  weekly: 227.50,  hasGracie: false },
      ORANGE:    { label: "Orange",    total: 3900,  weekly: 243.75,  hasGracie: false },
      ROAR:      { label: "Roar",      total: 2400,  weekly: 150.00,  hasGracie: true, gracieMeals: 60,  minSwipes: 3, maxSwipes: 4 },
      ROAR_PLUS: { label: "Roar Plus", total: 2150,  weekly: 134.375, hasGracie: true, gracieMeals: 100, minSwipes: 6, maxSwipes: 7 },
    };

    const SCHEDULE = {
      STRIPES:   [1000,937.5,875,812.5,750,687.5,625,562.5,500,437.5,375,312.5,250,187.5,125,62.5,0],
      CLAWS:     [1500,1406.25,1312.5,1218.75,1125,1031.25,937.5,843.75,750,656.25,562.5,468.75,375,281.25,187.5,93.75,0],
      SPIRIT:    [2000,1875,1750,1625,1500,1375,1250,1125,1000,875,750,625,500,375,250,125,0],
      BRICKS:    [2800,2625,2450,2275,2100,1925,1750,1575,1400,1225,1050,875,700,525,350,175,0],
      TIGER:     [3640,3412.5,3185,2957.5,2730,2502.5,2275,2047.5,1820,1592.5,1365,1137.5,910,682.5,455,227.5,0],
      ORANGE:    [3900,3656.25,3412.5,3168.75,2925,2681.25,2437.5,2193.75,1950,1706.25,1462.5,1218.75,975,731.25,487.5,243.75,0],
      ROAR:      [2400,2250,2100,1950,1800,1650,1500,1350,1200,1050,900,750,600,450,300,150,0],
      ROAR_PLUS: [2150,2015.625,1881.25,1746.875,1612.5,1478.125,1343.75,1209.375,1075,940.625,806.25,671.875,537.5,403.125,268.75,134.375,0],
    };

    const GRACIE_SCHEDULE = {
      ROAR:      [60,56,52,49,45,41,38,34,30,26,22,19,15,11,8,4,0],
      ROAR_PLUS: [100,94,88,81,75,69,62,56,50,44,38,31,25,19,12,6,0],
    };

    function Bar({ pct, color, label, value, total, dark }) {
      return (
        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <span style={{ color: "#fff", fontSize: 13 }}>{label}</span>
            <span style={{ fontSize: 13 }}>
              <span style={{ color, fontWeight: 700 }}>{value}</span>
              <span style={{ color: "#ccc" }}> / {total}</span>
            </span>
          </div>
          <div style={{ background: "#2a2a2a", borderRadius: 99, height: 24, overflow: "hidden" }}>
            <div style={{ width: Math.min(100,pct)+"%" , height: "100%", background: color, borderRadius: 99, transition: "width 0.5s ease", display: "flex", alignItems: "center", justifyContent: "flex-end", paddingRight: 8 }}>
              {pct > 10 && <span style={{ color: dark ? "#1a1a1a" : "white", fontSize: 11, fontWeight: 700 }}>{pct.toFixed(0)}%</span>}
            </div>
          </div>
        </div>
      );
    }

    function StatCard({ label, value, sub, highlight, warn }) {
      return (
        <div style={{ background: "#1a1a1a", borderRadius: 12, padding: 16, border: highlight ? "1.5px solid #ef444466" : warn ? "1.5px solid #f9731666" : "1px solid #444" }}>
          <div style={{ color: "#ddd", fontSize: 11, marginBottom: 6, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
          <div style={{ color: highlight ? "#ef4444" : warn ? "#f97316" : "#F76902", fontWeight: 800, fontSize: 22 }}>{value}</div>
          <div style={{ color: "#bbb", fontSize: 11, marginTop: 4 }}>{sub}</div>
        </div>
      );
    }

    function Banner({ color, bg, text }) {
      return (
        <div style={{ background: bg, border: "1.5px solid "+color+"55", borderRadius: 12, padding: "14px 18px", marginBottom: 16, color, fontWeight: 700, fontSize: 14, lineHeight: 1.5 }}>
          {text}
        </div>
      );
    }

    function App() {
      const [plan, setPlan] = useState("TIGER");
      const [week, setWeek] = useState(1);
      const [balance, setBalance] = useState("");
      const [balErr, setBalErr] = useState("");
      const [swipes, setSwipes] = useState("");
      const [swipeErr, setSwipeErr] = useState("");

      const p = PLANS[plan];
      const isRoar = p.hasGracie;
      const idealBal = SCHEDULE[plan][week];
      const bal = parseFloat(balance) || 0;
      const diff = bal - idealBal;
      const weeksLeft = 16 - week;
      const projWeekly = weeksLeft > 0 ? bal / weeksLeft : 0;

      const dollarOnTrack = Math.abs(diff) < 5;
      const dollarAhead = !dollarOnTrack && diff > 0;
      const dollarColor = dollarOnTrack ? "#22c55e" : dollarAhead ? "#3b82f6" : "#ef4444";
      const dollarBg = dollarOnTrack ? "#14532d22" : dollarAhead ? "#1e3a5f22" : "#7f1d1d22";
      const dollarMsg = dollarOnTrack
        ? "✅ Dining dollars on track — keep it up!"
        : dollarAhead
        ? "🟦 You're $"+Math.abs(diff).toFixed(2)+" ahead — you can treat yourself a little!"
        : "🔴 You're $"+Math.abs(diff).toFixed(2)+" behind — time to cut back on spending!";

      const spent = p.total - bal;
      const idealSpent = p.total - idealBal;
      const spentPct = (spent / p.total) * 100;
      const idealSpentPct = (idealSpent / p.total) * 100;

      const idealSwipesLeft = isRoar ? GRACIE_SCHEDULE[plan][week] : 0;
      const swipesLeft = parseInt(swipes) || 0;
      const swipesUsed = p.gracieMeals ? p.gracieMeals - swipesLeft : 0;
      const idealSwipesUsed = p.gracieMeals ? p.gracieMeals - idealSwipesLeft : 0;
      const swipeDiff = swipesLeft - idealSwipesLeft;
      const swipeOnTrack = Math.abs(swipeDiff) <= 2;
      const swipeAhead = !swipeOnTrack && swipeDiff > 0;
      const swipeColor = swipeOnTrack ? "#22c55e" : swipeAhead ? "#f97316" : "#ef4444";
      const swipeBg = swipeOnTrack ? "#14532d22" : swipeAhead ? "#43200522" : "#7f1d1d22";
      const swipeMsg = swipeOnTrack
        ? "🍽️ Gracie's meals on track! Aim for "+p.minSwipes+"–"+p.maxSwipes+" per week"
        : swipeAhead
        ? "⚠️ You have "+swipeDiff+" unused meals — start using Gracie's! Aim for "+p.minSwipes+"–"+p.maxSwipes+"/week or you'll waste them"
        : "🔴 Too many meals used! Slow down — only "+p.minSwipes+"–"+p.maxSwipes+"/week or you'll run out before semester ends!";
      const swipePct = p.gracieMeals ? (swipesUsed / p.gracieMeals) * 100 : 0;
      const idealSwipePct = p.gracieMeals ? (idealSwipesUsed / p.gracieMeals) * 100 : 0;
      const recSwipesPerWeek = weeksLeft > 0 ? Math.round(swipesLeft / weeksLeft) : 0;

      const handlePlanChange = (key) => { setPlan(key); setBalance(""); setBalErr(""); setSwipes(""); setSwipeErr(""); setWeek(1); };
      const handleBal = (e) => {
        const v = e.target.value;
        if (v !== "" && parseFloat(v) > p.total) { setBalErr("Max for "+p.label+" plan is $"+p.total.toLocaleString()); }
        else { setBalErr(""); setBalance(v); }
      };
      const handleSwipes = (e) => {
        const v = e.target.value;
        if (v !== "" && parseInt(v) > p.gracieMeals) { setSwipeErr("Max meals for "+p.label+" is "+p.gracieMeals); }
        else { setSwipeErr(""); setSwipes(v); }
      };

      const hasResult = balance !== "" && !balErr;

      return (
        <div style={{ minHeight: "100vh", background: "#1a1a1a", padding: "20px 16px 40px" }}>
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <span style={{ background: "#F76902", color: "white", fontWeight: 900, fontSize: 26, padding: "4px 14px", borderRadius: 6, letterSpacing: 2 }}>RIT</span>
              <span style={{ color: "#F76902", fontWeight: 800, fontSize: 20 }}>Dining Tracker</span>
            </div>
            <p style={{ color: "#bbb", fontSize: 13 }}>Track your meal plan — know exactly where you stand 💰</p>
          </div>

          <div style={{ maxWidth: 580, margin: "0 auto" }}>

            <div style={{ background: "#242424", borderRadius: 16, padding: 20, marginBottom: 16, border: "1px solid #444" }}>
              <label style={{ color: "#fff", fontSize: 12, fontWeight: 700, display: "block", marginBottom: 10, textTransform: "uppercase", letterSpacing: 1 }}>1. Select Your Meal Plan</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
                {Object.entries(PLANS).map(([key, pl]) => (
                  <button key={key} className="plan-btn" onClick={() => handlePlanChange(key)} style={{
                    padding: "8px 14px", borderRadius: 8, border: "2px solid",
                    borderColor: plan === key ? "#F76902" : "#555",
                    background: plan === key ? "#F76902" : "#2e2e2e",
                    color: plan === key ? "white" : "#ddd",
                    fontWeight: 700, fontSize: 13, cursor: "pointer"
                  }}>{pl.label}</button>
                ))}
              </div>
              <div style={{ background: "#1a1a1a", borderRadius: 10, padding: 12, border: "1px solid #333" }}>
                <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
                  <div><div style={{ color: "#aaa", fontSize: 11, marginBottom: 2 }}>Starting Balance</div><div style={{ color: "#F76902", fontWeight: 800, fontSize: 20 }}>${p.total.toLocaleString()}</div></div>
                  <div><div style={{ color: "#aaa", fontSize: 11, marginBottom: 2 }}>Weekly Budget</div><div style={{ color: "#F76902", fontWeight: 800, fontSize: 20 }}>${p.weekly.toFixed(2)}</div></div>
                  {p.hasGracie && <div><div style={{ color: "#aaa", fontSize: 11, marginBottom: 2 }}>Block Meals</div><div style={{ color: "#F76902", fontWeight: 800, fontSize: 20 }}>{p.gracieMeals} total</div></div>}
                  <div><div style={{ color: "#aaa", fontSize: 11, marginBottom: 2 }}>Semester</div><div style={{ color: "#F76902", fontWeight: 800, fontSize: 20 }}>16 weeks</div></div>
                </div>
              </div>
            </div>

            <div style={{ background: "#242424", borderRadius: 16, padding: 20, marginBottom: 16, border: "1px solid #444" }}>
              <label style={{ color: "#fff", fontSize: 12, fontWeight: 700, display: "block", marginBottom: 10, textTransform: "uppercase", letterSpacing: 1 }}>2. Enter Your Info</label>
              <div style={{ marginBottom: 16 }}>
                <label style={{ color: "#ddd", fontSize: 13, display: "block", marginBottom: 6 }}>Current Week</label>
                <select value={week} onChange={e => setWeek(Number(e.target.value))} style={{ width: "100%", padding: "12px 14px", background: "#1a1a1a", border: "2px solid #555", borderRadius: 10, color: "white", fontSize: 14, fontWeight: 600, cursor: "pointer", outline: "none" }}>
                  {Array.from({ length: 16 }, (_, i) => i + 1).map(w => (
                    <option key={w} value={w}>Week {w} — You should have ${SCHEDULE[plan][w].toFixed(2)} left</option>
                  ))}
                </select>
              </div>
              <div style={{ marginBottom: balErr ? 4 : 0 }}>
                <label style={{ color: "#ddd", fontSize: 13, display: "block", marginBottom: 6 }}>Your Dining Dollar Balance <span style={{ color: "#aaa", fontWeight: 400 }}>(max ${p.total.toLocaleString()})</span></label>
                <div style={{ position: "relative" }}>
                  <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", color: "#F76902", fontWeight: 800, fontSize: 22 }}>$</span>
                  <input type="number" min={0} max={p.total} step={0.01} value={balance} onChange={handleBal}
                    placeholder="Enter balance from tigerspend.rit.edu"
                    style={{ width: "100%", padding: "14px 14px 14px 36px", background: "#1a1a1a", border: "2px solid "+(balErr?"#ef4444":"#555"), borderRadius: 10, color: "white", fontSize: 20, fontWeight: 700, outline: "none" }} />
                </div>
                {balErr && <p style={{ color: "#ef4444", fontSize: 12, marginTop: 6 }}>⚠️ {balErr}</p>}
              </div>
              {isRoar && (
                <div style={{ marginTop: 16, background: "#1a1a1a", borderRadius: 12, padding: 14, border: "1px solid #555" }}>
                  <label style={{ color: "#ddd", fontSize: 13, display: "block", marginBottom: 4 }}>🍽️ Gracie's Block Meals Remaining <span style={{ color: "#aaa", fontWeight: 400 }}>(max {p.gracieMeals})</span></label>
                  <p style={{ color: "#bbb", fontSize: 11, marginBottom: 10 }}>Check remaining block meals on tigerspend.rit.edu</p>
                  <input type="number" min={0} max={p.gracieMeals} step={1} value={swipes} onChange={handleSwipes}
                    placeholder={"e.g. "+idealSwipesLeft}
                    style={{ width: "100%", padding: "12px 14px", background: "#242424", border: "2px solid "+(swipeErr?"#ef4444":"#555"), borderRadius: 10, color: "white", fontSize: 20, fontWeight: 700, outline: "none" }} />
                  {swipeErr && <p style={{ color: "#ef4444", fontSize: 12, marginTop: 6 }}>⚠️ {swipeErr}</p>}
                </div>
              )}
            </div>

            {hasResult && (
              <div>
                <Banner color={dollarColor} bg={dollarBg} text={dollarMsg} />
                {isRoar && swipes !== "" && !swipeErr && <Banner color={swipeColor} bg={swipeBg} text={swipeMsg} />}

                <div style={{ background: "#242424", borderRadius: 16, padding: 20, marginBottom: 16, border: "1px solid #444" }}>
                  <p style={{ color: "#fff", fontSize: 13, fontWeight: 700, marginBottom: 16, textTransform: "uppercase", letterSpacing: 0.5 }}>📊 Dining Dollar Breakdown</p>
                  <Bar pct={spentPct} color={dollarColor} label="💳 You have spent" value={"$"+spent.toFixed(2)} total={"$"+p.total.toLocaleString()} />
                  <Bar pct={idealSpentPct} color="#facc15" label={"🎯 Ideal spent by week "+week} value={"$"+idealSpent.toFixed(2)} total={"$"+p.total.toLocaleString()} dark={true} />
                  <p style={{ color: "#bbb", fontSize: 11, textAlign: "center", marginTop: 4 }}>Your bar should be close to the 🎯 yellow bar</p>
                </div>

                {isRoar && swipes !== "" && !swipeErr && (
                  <div style={{ background: "#242424", borderRadius: 16, padding: 20, marginBottom: 16, border: "1px solid #444" }}>
                    <p style={{ color: "#fff", fontSize: 13, fontWeight: 700, marginBottom: 16, textTransform: "uppercase", letterSpacing: 0.5 }}>🍽️ Gracie's Block Meal Breakdown</p>
                    <Bar pct={swipePct} color={swipeColor} label="🍴 Block meals used" value={swipesUsed+""} total={p.gracieMeals+""} />
                    <Bar pct={idealSwipePct} color="#facc15" label={"🎯 Ideal used by week "+week} value={idealSwipesUsed+""} total={p.gracieMeals+""} dark={true} />
                    <p style={{ color: "#bbb", fontSize: 11, textAlign: "center", marginTop: 4 }}>Your bar should be close to the 🎯 yellow bar</p>
                  </div>
                )}

                <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                  <StatCard label="Ideal Balance This Week" value={"$"+idealBal.toFixed(2)} sub="what you should have right now" />
                  <StatCard label="Your Balance" value={"$"+bal.toFixed(2)} sub="what you actually have" />
                  <StatCard label="Standard Weekly Budget" value={"$"+p.weekly.toFixed(2)} sub="to spend each week on track" />
                  <StatCard label="Your Adjusted Weekly" value={"$"+projWeekly.toFixed(2)} sub={"to spend over "+weeksLeft+" weeks left"} highlight={projWeekly > p.weekly * 1.3} warn={projWeekly < p.weekly * 0.7} />
                  <StatCard label="Difference from Ideal" value={(diff >= 0 ? "+" : "")+"$"+diff.toFixed(2)} sub={diff >= 0 ? "ahead of schedule 🎉" : "behind schedule ⚠️"} highlight={diff < -50} />
                  <StatCard label="Weeks Remaining" value={weeksLeft+""} sub="weeks left in semester" />
                  {isRoar && swipes !== "" && !swipeErr && <>
                    <StatCard label="Block Meals Left" value={swipesLeft+""} sub={"should be ~"+idealSwipesLeft+" by now"} highlight={swipesLeft < idealSwipesLeft - 3} warn={swipesLeft > idealSwipesLeft + 3} />
                    <StatCard label="Rec. Block Meals/Week" value={recSwipesPerWeek+""} sub={"ideal: "+p.minSwipes+"–"+p.maxSwipes+"/week"} highlight={recSwipesPerWeek > p.maxSwipes + 1} warn={recSwipesPerWeek < p.minSwipes - 1} />
                  </>}
                </div>

                <div style={{ background: "#242424", borderRadius: 16, padding: 20, marginBottom: 16, border: "1px solid #444" }}>
                  <p style={{ color: "#fff", fontSize: 13, fontWeight: 700, marginBottom: 14, textTransform: "uppercase", letterSpacing: 0.5 }}>📅 Full Semester Schedule</p>
                  <div style={{ overflowX: "auto" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                      <thead>
                        <tr style={{ borderBottom: "1px solid #444" }}>
                          <th style={{ color: "#aaa", padding: "6px 8px", textAlign: "left" }}>Week</th>
                          <th style={{ color: "#aaa", padding: "6px 8px", textAlign: "right" }}>Should Have</th>
                          {isRoar && <th style={{ color: "#aaa", padding: "6px 8px", textAlign: "right" }}>Block Meals</th>}
                          <th style={{ color: "#aaa", padding: "6px 8px", textAlign: "right" }}>Status</th>
                        </tr>
                      </thead>
                      <tbody>
                        {Array.from({ length: 16 }, (_, i) => i + 1).map(w => {
                          const isCurrent = w === week;
                          return (
                            <tr key={w} style={{ borderBottom: "1px solid #333", background: isCurrent ? "#F7690215" : "transparent" }}>
                              <td style={{ padding: "8px 8px", color: isCurrent ? "#F76902" : "#ddd", fontWeight: isCurrent ? 700 : 400 }}>{isCurrent ? "👉 " : ""}Week {w}</td>
                              <td style={{ padding: "8px 8px", textAlign: "right", color: isCurrent ? "#F76902" : "#ddd", fontWeight: isCurrent ? 700 : 400 }}>${SCHEDULE[plan][w].toFixed(2)}</td>
                              {isRoar && <td style={{ padding: "8px 8px", textAlign: "right", color: isCurrent ? "#F76902" : "#ddd", fontWeight: isCurrent ? 700 : 400 }}>{GRACIE_SCHEDULE[plan][w]}</td>}
                              <td style={{ padding: "8px 8px", textAlign: "right" }}>
                                {isCurrent ? <span style={{ color: dollarColor, fontWeight: 700 }}>← You are here</span> : w < week ? <span style={{ color: "#555" }}>past</span> : <span style={{ color: "#555" }}>upcoming</span>}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {!hasResult && (
              <div style={{ background: "#242424", borderRadius: 16, padding: 32, textAlign: "center", border: "1px solid #444" }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>💰</div>
                <p style={{ color: "#ddd", fontSize: 15, fontWeight: 600, marginBottom: 6 }}>Enter your balance above to get started</p>
                <p style={{ color: "#aaa", fontSize: 13 }}>Check your balance at <a href="https://tigerspend.rit.edu" target="_blank" rel="noreferrer" style={{ color: "#F76902" }}>tigerspend.rit.edu</a></p>
              </div>
            )}

            <div style={{ textAlign: "center", marginTop: 20, padding: 16, background: "#242424", borderRadius: 12, border: "1px solid #444" }}>
              <p style={{ color: "#bbb", fontSize: 12, marginBottom: 6 }}>
                🔗 <a href="https://tigerspend.rit.edu" target="_blank" rel="noreferrer" style={{ color: "#F76902", textDecoration: "none" }}>tigerspend.rit.edu</a>
                <span style={{ color: "#555", margin: "0 8px" }}>|</span>
                <a href="https://rit.edu/dining" target="_blank" rel="noreferrer" style={{ color: "#F76902", textDecoration: "none" }}>rit.edu/dining</a>
              </p>
              <p style={{ color: "#555", fontSize: 11 }}>Check your balance and dining hours anytime</p>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
